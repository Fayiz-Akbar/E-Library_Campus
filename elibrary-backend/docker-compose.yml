version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: elibrary_db
    restart: always
    environment:
      POSTGRES_USER: elibrary_user
      POSTGRES_PASSWORD: elibrary_pass
      POSTGRES_DB: elibrary_db
    ports:
      - "5432:5432"
    volumes:
      - elibrary_pgdata:/var/lib/postgresql/data

volumes:
  elibrary_pgdata: